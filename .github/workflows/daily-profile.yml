name: Daily Profile Update

on:
  workflow_dispatch:
  push:
    branches:
      - main
  schedule:
    - cron: "0 0 * * *"

jobs:
  devcard:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Update DevCard
        uses: dailydotdev/action-devcard@3.2.1
        with:
          user_id: ${{ secrets.USER_ID }}
          commit_message: "chore: update ${filename}"

  update-profile:
    runs-on: ubuntu-latest
    needs: devcard
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          token: ${{ secrets.GH_PAT }}
          ref: main

      - name: Generate Snake
        uses: Platane/snk@v3
        with:
          github_user_name: trinhminhnhat
          outputs: |
            images/github-snake.svg

      - name: Fetch Quote
        run: |
          QUOTE_JSON=$(curl -sf "https://programming-quotesapi.vercel.app/api/random" || echo '{"quote":"Any fool can write code that a computer can understand. Good programmers write code that humans can understand.","author":"Martin Fowler"}')
          QUOTE=$(echo "$QUOTE_JSON" | jq -r '.quote // .text // "Code is like humor. When you have to explain it, it is bad."')
          AUTHOR=$(echo "$QUOTE_JSON" | jq -r '.author // "Unknown"')

          sed -i '/<!-- QUOTE:START -->/,/<!-- QUOTE:END -->/c\<!-- QUOTE:START -->\n> _"'"${QUOTE//\"/\\\"}"'"_\n>\n> — **'"${AUTHOR}"'**\n<!-- QUOTE:END -->' README.md

      - name: Fetch LeetCode Stats
        run: |
          curl -sf "https://leetcard.jacoblin.cool/trinhminhnhat?theme=nord&font=Noto%20Sans%20Manichaean" -o images/leetcode-stats.svg || echo "LeetCode card fetch failed, skipping"

      - name: Commit and Push
        env:
          GH_PAT: ${{ secrets.GH_PAT }}
        run: |
          git config user.name "Trịnh Minh Nhật"
          git config user.email "trinhmnhat@gmail.com"
          git remote set-url origin "https://x-access-token:${GH_PAT}@github.com/trinhminhnhat/trinhminhnhat.git"
          git add -A
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore: daily profile update $(date -u '+%Y-%m-%d') [skip ci]"
            git pull --rebase
            git push
          fi
